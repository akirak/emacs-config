name: Update the flake from the registry

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - flake-update
  workflow_call:

jobs:
  update:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: develop
          persist-credentials: false
      - name: Set up Nix
        uses: ./.github/actions/setup
        with:
          cachix-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: nix flake update --inputs-from github:akirak/flake-pins
      - name: Update the lock entries
        run: |
          nix run .#lock --impure
          nix run .#update --impure
      - uses: peter-evans/create-pull-request@d32e88dac789dcc7906e7d26f69f24116fa9c97d
        with:
          base: develop
          token: ${{ secrets.GITHUB_TOKEN }}
          title: 'deps: Update the root flake.lock'
          branch: bot/update/flake-lock
          labels: automation,update,emacs
