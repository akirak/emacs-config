name: Update the AI model list

on:
  workflow_dispatch:
  workflow_call:
  schedule:
    - cron: '5 0 * * 5'

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          app-id: ${{ secrets.CREATE_PR_APP_ID }}
          private-key: ${{ secrets.CREATE_PR_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - uses: actions/checkout@v6
        with:
          ref: develop

      - name: Set up Nix
        uses: ./.github/actions/setup
        with:
          cachix-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Update the models
        run: nix run .#update-ai-models

      - uses: peter-evans/create-pull-request@d8c15c739ffb916295c3e41a2e70c38504c0f6dc
        id: cpr
        with:
          base: develop
          token: ${{ steps.generate-token.outputs.token }}
          title: 'chore: Update the model list'
          branch: bot/update/ai-models
          labels: automation,update,emacs

      - name: Auto-merge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        run: |
          if gh pr merge ${{ steps.cpr.outputs.pull-request-number }} \
            --delete-branch --squash --auto; then
            echo "Auto-merge enabled for PR #${{ steps.cpr.outputs.pull-request-number }}."
          else
            echo "Skipping auto-merge: it could not be enabled for PR #${{ steps.cpr.outputs.pull-request-number }}."
          fi
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
