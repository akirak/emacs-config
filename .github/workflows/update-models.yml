name: Update the AI model list

on:
  workflow_dispatch:
  workflow_call:
  schedule:
    - cron: '5 0 * * 5'

jobs:
  update:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: develop
    - name: Set up Nix
      uses: ./.github/actions/setup
      with:
        cachix-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
    - run: nix run .#update-ai-models
    - uses: peter-evans/create-pull-request@d32e88dac789dcc7906e7d26f69f24116fa9c97d
      with:
        base: develop
        token: ${{ secrets.GITHUB_TOKEN }}
        title: 'chore: Update the model list'
        branch: bot/update/ai-models
        labels: automation,update,emacs
