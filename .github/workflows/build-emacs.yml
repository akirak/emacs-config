name: Build Emacs packages

on:
  push:
    branches-ignore:
      - master
    paths:
      - emacs-config.org
      - lisp/**
      - lock/**
      - recipes/**
      - nix/lib/**
      - nix/lsp-proxy-config.nix
      - nix/twist/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  deps-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Nix
        uses: ./.github/actions/setup
        with:
          cachix-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - run: nix build .#emacs-config.depsCheck --print-build-logs

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Nix
        uses: ./.github/actions/setup
        with:
          cachix-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # nix-fast-build may not utilize substituters configured in the flake,
      # so run `nix build` to prefetch dependencies beforehand.
      - name: Prefetch dependencies
        run: nix build .#emacs-config.emacs --accept-flake-config --no-link

      - name: Build Emacs Lisp packages
        run: |
          system="$(nix eval --impure --raw --expr builtins.currentSystem)"
          nix build ".#checks.$system.elisp-packages" -L

      #   run: |
      #     nix run .#nix-fast-build -- \
      #       --flake "#packages.x86_64-linux.emacs-config.elispPackages" \
      #       --no-nom \
      #       --skip-cached \
      #       --no-link \
      #       --option accept-flake-config true \
      #       --cachix-cache akirak
